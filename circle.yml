checkout:
  post:
    - git submodule update --init

dependencies:
  cache_directories:
    - "~/docker"
  pre:
    # update locally with:
    # openssl aes-256-cbc -e -in secret-env-plain -out secret-env-cipher -k $KEY
    - openssl aes-256-cbc -d -in src/ci/circle-secrets -k $KEY >> ~/.circlerc

  override:
    - if [[ -e ~/docker/image.tar ]]; then docker load -i ~/docker/image.tar; fi
    - curl -o $HOME/bin/sccache https://s3.amazonaws.com/rust-lang-ci/rust-ci-mirror/2017-03-16-sccache-x86_64-unknown-linux-musl &&
      chmod +x $HOME/bin/sccache
    - curl -o $HOME/bin/stamp https://s3.amazonaws.com/rust-lang-ci/rust-ci-mirror/2017-03-17-stamp-x86_64-unknown-linux-musl &&
      chmod +x $HOME/bin/stamp

database:
  override:
    - echo nope

compile:
  override:
    - echo nope

machine:
  environment:
    SCCACHE_BUCKET: rust-lang-ci-sccache
    AWS_ACCESS_KEY_ID: AKIAIMX7VLAS3PZAVLUQ
    # AWS_SECRET_ACCESS_KEY=located in src/ci/circle-secrets
  services:
    - docker

test:
  override:
    - stamp src/ci/docker/run.sh x86_64-gnu

  post:
    - mkdir -p ~/docker; docker save rust-ci > ~/docker/image.tar
